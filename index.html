<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Gojo Login</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;

background: linear-gradient(135deg,#0b0b0b,#2a003f,#ff003c);
color:white;
}

.login-box{
background: rgba(0,0,0,0.8);
padding:40px;
border-radius:20px;
width:300px;
text-align:center;

box-shadow:
0 0 20px #ff004c,
0 0 40px #8a00ff;
}

h2{
color:#ff2f6b;
text-shadow:0 0 10px #ff0055;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
background:#111;
color:white;
box-shadow:0 0 10px #8a00ff;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;

background: linear-gradient(90deg,#ff003c,#8a00ff);
color:white;
font-size:18px;
cursor:pointer;

box-shadow:0 0 15px #ff004c;
}

button:hover{
transform:scale(1.05);
}

.key{
margin-top:15px;
font-size:14px;
color:#ccc;
}

#error{
color:red;
margin-top:10px;
}

</style>
</head>

<body>

<div class="login-box">

<h2>GOJO LOGIN</h2>

<input type="text" id="user" placeholder="Tài khoản">

<input type="password" id="pass" placeholder="Mật khẩu">

<button onclick="login()">Đăng nhập</button>

<div id="error"></div>

<div class="key">
Mua key: <b>hieuneslibilitoilet</b>
</div>

</div>

<script>

function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

if(user==="admin" && pass==="081"){

window.location.href="home.html";

}else{

document.getElementById("error").innerText="Sai tài khoản hoặc mật khẩu";

}

}

</script>

</body>
</html>
