<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Gojo Login</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;

background: linear-gradient(135deg,#000000,#2a003f,#ff003c);
color:white;
}

.login-box{
background:rgba(0,0,0,0.85);
padding:50px;
border-radius:20px;
width:420px;
text-align:center;

box-shadow:
0 0 25px #ff004c,
0 0 45px #8a00ff;
}

h2{
font-size:36px;
margin-bottom:20px;
color:#ff2f6b;
}

input{
width:100%;
padding:16px;
margin:12px 0;
border-radius:12px;
border:none;
background:#111;
color:white;
font-size:18px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#ff003c,#8a00ff);
color:white;
font-size:20px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

#error{
margin-top:10px;
color:red;
}

.key{
margin-top:15px;
font-size:14px;
color:#ccc;
}

</style>
</head>

<body>

<div class="login-box">

<h2>GOJO LOGIN</h2>

<input type="text" id="user" placeholder="Tài khoản">

<input type="password" id="pass" placeholder="Mật khẩu">

<button onclick="login()">Đăng nhập</button>

<div id="error"></div>

<div class="key">
Mua key: <b>hieuneslibilitoilet</b>
</div>

</div>

<script>

function login(){

let user=document.getElementById("user").value.trim();
let pass=document.getElementById("pass").value.trim();

if(user==="admin" && pass==="081"){

window.location.href="home.html";

}else{

document.getElementById("error").innerText="Sai tài khoản hoặc mật khẩu";

}

}

</script>

</body>
</html>
