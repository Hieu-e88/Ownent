<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game Center</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;

background:linear-gradient(180deg,#000000,#1a0030,#4b005e,#ff003c);
min-height:100vh;
}

.container{
max-width:420px;
margin:auto;
padding:30px;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
margin-top:20px;

box-shadow:
0 0 20px #ff004c,
0 0 40px #8a00ff;

object-fit:cover;
}

h2{
margin:10px 0;
font-size:28px;
}

p{
opacity:0.8;
margin-bottom:30px;
}

.card{
display:block;
background:#111;
margin:20px 0;
border-radius:15px;
overflow:hidden;
text-decoration:none;
color:white;

box-shadow:0 0 15px #8a00ff;

transition:0.25s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px #ff004c;
}

.card img{
width:100%;
display:block;
}

.title{
padding:15px;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<img class="avatar" src="avatar.png">

<h2>Hieuneskibilitoilet</h2>
<p>🎮 Mini Game Center</p>

<a class="card" href="blockblat.html">
<img src="game1.png">
<div class="title">🎮bờ lóc bờ lát</div>
</a>

<a class="card" href="minecraft.html">
<img src="minecraft.png">
<div class="title">🔥minecraft</div>
</a>

<a class="card" href="pass.html">
<img src="pass.png">
<div class="title">⚡trình tạo mật khẩu</div>
</a>
<a class="card" href="bien.html">
<img src="bien.png">
<div class="title">⚡máy tính tuổi thông minh</div>
</a>
  
<a class="card" href="https://youtube.com">
<img src="yt.png">
<div class="title">▶ Youtube</div>
</a>

</div>

</body>
</html>
