<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Anime Login</title>

<style>

body{
margin:0;
font-family:Arial;
background: linear-gradient(135deg,#ff9afc,#9adfff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:rgba(255,255,255,0.9);
padding:40px;
border-radius:20px;
width:300px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.3);
}

h2{
color:#ff4fd8;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff4fd8,#4fdcff);
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.key{
margin-top:15px;
font-size:14px;
color:#444;
}

#error{
color:red;
margin-top:10px;
}

</style>
</head>

<body>

<div class="login-box">

<h2>🌸 Anime Login 🌸</h2>

<input type="text" id="user" placeholder="Tài khoản">

<input type="password" id="pass" placeholder="Mật khẩu">

<button onclick="login()">Đăng nhập</button>

<div id="error"></div>

<div class="key">
Mua key: <b>hieuneslibilitoilet</b>
</div>

</div>

<script>

function login(){

let user = document.getElementById("user").value;
let pass = document.getElementById("pass").value;

if(user === "admin" && pass === "081"){
alert("Đăng nhập thành công!");
window.location.href="index.html";
}
else{
document.getElementById("error").innerText="Sai tài khoản hoặc mật khẩu!";
}

}

</script>

</body>
</html>
